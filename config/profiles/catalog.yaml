apiVersion: micro-task-engine/v1alpha1
kind: PaperclipProfileCatalog
toolPolicies:
  postgres-ssot-notion-readonly-v1:
    sourceOfTruth: postgres
    agentCanonicalWrite:
      provider: postgrest
      allowed: true
      credentialRef: POSTGREST_PAPERCLIP_TOKEN
      toolBundleDelivery:
        status: blocked
        failClosed: true
        inProfileToolBundle: false
        blocker: postgrest-mcp-workload-not-reviewed
    notionAgentAccess:
      mode: read_only
      rawCredentialInHarness: false
      credentialDelivery: toolhive_workload_only
      registry:
        package: io.github.stacklok/notion
        registryImage: ghcr.io/stacklok/dockyard/npx/notion:2.2.1
        pinnedImage: ghcr.io/stacklok/dockyard/npx/notion@sha256:180a55ce48d1d08888abb9920a6d24ba178929e4131722579466c494eec3d08f
        repositoryUrl: https://github.com/makenotion/notion-mcp-server
        apiVersion: '2025-09-03'
        secretRef: NOTION_TOKEN
      allowedTools:
        - API-get-block-children
        - API-get-self
        - API-get-user
        - API-get-users
        - API-list-data-source-templates
        - API-post-search
        - API-query-data-source
        - API-retrieve-a-block
        - API-retrieve-a-comment
        - API-retrieve-a-data-source
        - API-retrieve-a-database
        - API-retrieve-a-page
        - API-retrieve-a-page-property
      deniedTools:
        - API-create-a-comment
        - API-create-a-data-source
        - API-delete-a-block
        - API-move-page
        - API-patch-block-children
        - API-patch-page
        - API-post-page
        - API-update-a-block
        - API-update-a-data-source
      enforcement:
        provider: toolhive
        runFlag: --tools
        filtersToolsList: true
        deniesToolsCall: true
    notionWriteConnector:
      identity: mte.notion.connector
      executable: server-notion.py
      credentialRef: NOTION_TOKEN
      agentReachable: false
      authority: postgres
      operations:
        - create
        - update
        - archive
skillPackages:
  verification-before-completion:
    source: skills/verification-before-completion
    projection: runtime/paperclip/profiles/skills/verification-before-completion
    manifest: SKILL.md
    manifestSha256: 7560fd8dff901740f317a259488ffbbb473dfb69203617491e7e511a41eba730
    metadata: agents/openai.yaml
    metadataSha256: f2e13306667f509a59ed35834eaf136dc23806b74fa82b80e0ee8b9f1309f207
    contractId: mte.verify-before-completion.v1
    nativeDestinations:
      codex: /home/daytona/.agents/skills/verification-before-completion
      claude: /home/daytona/.claude/skills/verification-before-completion
      pi: /home/daytona/.pi/mte-profile/skills/verification-before-completion
extensions:
  - ref: context7-codex
    kind: extension
    mcpCapability: context7
    deliveryKey: context7
    enabledProfiles:
      - coding-daytona-codex
    package:
      kind: runtime
      ref: codex
    config:
      mode: native_remote_mcp
      serverName: context7
      endpointRef: MTE_CONTEXT7_MCP_URL
      credentialRef: CONTEXT7_API_KEY
      credentialRequired: false
      runtimeConfigSource: nativeAdapterConfig.extraArgs
    credentialRefs:
      - CONTEXT7_API_KEY
  - ref: context7-claude
    kind: extension
    mcpCapability: context7
    deliveryKey: context7
    enabledProfiles:
      - coding-daytona-claude
    package:
      kind: runtime
      ref: claudeCode
    config:
      mode: native_remote_mcp
      serverName: context7
      endpointRef: MTE_CONTEXT7_MCP_URL
      credentialRef: CONTEXT7_API_KEY
      credentialRequired: false
      configPath: /etc/claude-code/managed-mcp.json
    credentialRefs:
      - CONTEXT7_API_KEY
  - ref: context7-pi
    kind: extension
    mcpCapability: context7-pi-extension
    deliveryKey: context7
    enabledProfiles:
      - coding-daytona-pi
    package:
      kind: npm
      ref: '@upstash/context7-pi'
      versionRef: MTE_CONTEXT7_PI_VERSION
      integrityRef: MTE_CONTEXT7_PI_NPM_INTEGRITY
    config:
      mode: official_pi_extension
      credentialRef: CONTEXT7_API_KEY
      credentialRequired: false
      configPath: /home/daytona/.pi/mte-profile/settings.json
    credentialRefs:
      - CONTEXT7_API_KEY
  - ref: toolhive-codex
    kind: extension
    mcpCapability: toolhive
    deliveryKey: profileTools
    enabledProfiles:
      - coding-daytona-codex
    package:
      kind: runtime
      ref: codex
    config:
      mode: native_remote_mcp
      serverName: mte-profile-tools
      endpointRef: MTE_AGENT_GATEWAY_TOOLHIVE_CODEX_URL
      credentialRef: MTE_TOOLHIVE_BEARER_TOKEN
      runtimeConfigSource: nativeAdapterConfig.extraArgs
    credentialRefs:
      - MTE_TOOLHIVE_BEARER_TOKEN
  - ref: toolhive-claude
    kind: extension
    mcpCapability: toolhive
    deliveryKey: profileTools
    enabledProfiles:
      - coding-daytona-claude
    package:
      kind: runtime
      ref: claudeCode
    config:
      mode: native_remote_mcp
      serverName: mte-profile-tools
      endpointRef: MTE_AGENT_GATEWAY_TOOLHIVE_CLAUDE_URL
      credentialRef: MTE_TOOLHIVE_BEARER_TOKEN
      configPath: /etc/claude-code/managed-mcp.json
    credentialRefs:
      - MTE_TOOLHIVE_BEARER_TOKEN
  - ref: toolhive-pi
    kind: extension
    mcpCapability: toolhive-pi-extension
    deliveryKey: profileTools
    enabledProfiles:
      - coding-daytona-pi
    package:
      kind: local
      ref: deployment/agent-runtime/pi/mte-toolhive.js
      integrityRef: MTE_PI_TOOLHIVE_EXTENSION_SHA256
    config:
      mode: pi_extension
      projectionRootRef: MTE_PI_CODING_AGENT_DIR
      projectionRelativePath: extensions/mte-toolhive.js
      endpointRef: MTE_AGENT_GATEWAY_TOOLHIVE_PI_URL
      credentialRef: MTE_TOOLHIVE_BEARER_TOKEN
      bindingRef: MTE_TOOLHIVE_BINDING_REF
      bundleRef: MTE_TOOLHIVE_BUNDLE_ID
      workloadRef: MTE_TOOLHIVE_WORKLOAD_ID
      tools:
        - toolhive_list_tools
        - toolhive_call
    credentialRefs:
      - MTE_TOOLHIVE_BEARER_TOKEN
profiles:
  - ref: coding-daytona-codex
    title: Coding - Daytona / Codex
    role: engineer
    nativeAdapter: ${PROFILE_CODING_DAYTONA_CODEX_ADAPTER:?required}
    defaultEnvironment: ${PROFILE_CODING_DAYTONA_CODEX_DEFAULT_ENVIRONMENT:?required}
    workspaceMode: isolated_workspace
    runtimeContract:
      harnessKind: codex
      adapterType: ${PROFILE_CODING_DAYTONA_CODEX_ADAPTER:?required}
      protocol: openai-responses
      packageKey: codex
      runtimeSecretEnv: OPENAI_API_KEY
      envAllowlist:
        - CODEX_HOME
        - CONTEXT7_API_KEY
        - GH_TOKEN
        - GITHUB_TOKEN
        - MTE_AGENT_GATEWAY_TOOLHIVE_CODEX_URL
        - MTE_TOOLHIVE_BEARER_TOKEN
        - MTE_TOOLHIVE_BINDING_REF
        - MTE_TOOLHIVE_BUNDLE_ID
        - MTE_TOOLHIVE_CANARY_TOOL
        - MTE_TOOLHIVE_ENDPOINT_REF
        - MTE_TOOLHIVE_WORKLOAD_ID
        - MTE_TOOLHIVE_WRONG_PROFILE_MCP_URL
        - OPENAI_API_KEY
        - OPENAI_BASE_URL
        - PAPERCLIP_CODEX_PROVIDERS
      providerManagedEnv:
        CODEX_HOME:
          kind: paperclip-agent-home
          pathSuffix: codex-home
      probe:
        helloCode: codex_hello_probe_passed
        acceptedWarnings: []
    topology:
      wrongProfileRef: coding-daytona-claude
      toolhiveUpstreamRef: MTE_AGENT_GATEWAY_TOOLHIVE_CODEX_UPSTREAM
      toolhiveGatewayPortRef: MTE_AGENT_GATEWAY_TOOLHIVE_CODEX_PORT
      toolhiveProxyPortRef: TOOLHIVE_PROFILE_CODING_DAYTONA_CODEX_PROXY_PORT
      toolhiveIdentityPortRef: TOOLHIVE_PROFILE_CODING_DAYTONA_CODEX_EVERYTHING_PROXY_PORT
      toolhiveNotionPortRef: TOOLHIVE_PROFILE_CODING_DAYTONA_CODEX_NOTION_PROXY_PORT
    nativeAdapterConfig:
      cwd: /home/daytona/paperclip-workspace
      model: ${PROFILE_CODING_DAYTONA_CODEX_MODEL:?required}
      # Paperclip 2026.707.0 builds the complete user-authored issue context in
      # context.paperclipTaskMarkdown, but the Codex adapter does not append it
      # to a fresh-session prompt.  Keep this declarative adapter override until
      # upstream does so natively; continuations retain the initial context.
      bootstrapPromptTemplate: '{{context.paperclipTaskMarkdown}}'
      extraArgs:
        - -c
        - model_provider="mte9router"
        - -c
        - model_providers.mte9router.name="MTE 9Router"
        - -c
        - model_providers.mte9router.base_url="${MTE_AGENT_GATEWAY_NINEROUTER_OPENAI_BASE_URL:?required}"
        - -c
        - model_providers.mte9router.env_key="OPENAI_API_KEY"
        - -c
        - model_providers.mte9router.wire_api="responses"
        - -c
        - mcp_servers.mte-profile-tools.url="${MTE_AGENT_GATEWAY_TOOLHIVE_CODEX_URL:?required}"
        - -c
        - mcp_servers.mte-profile-tools.bearer_token_env_var="MTE_TOOLHIVE_BEARER_TOKEN"
        - -c
        - mcp_servers.context7.url="${MTE_CONTEXT7_MCP_URL:?required}"
      timeoutSec: ${PROFILE_CODING_DAYTONA_CODEX_TIMEOUT_SEC:?required}
      dangerouslyBypassApprovalsAndSandbox: true
    # Paperclip's status-only recovery handoff requests the built-in `cheap`
    # model profile. Override that profile back to this agent's canonical
    # 9router model instead of accepting the Codex adapter's OpenAI default.
    paperclipRuntimeConfig:
      modelProfiles:
        cheap:
          enabled: true
          label: MTE 9router MiniMax recovery
          adapterConfig:
            model: ${PROFILE_CODING_DAYTONA_CODEX_MODEL:?required}
    instructions: instructions/coding.md
    skills:
      - verification-before-completion
    extensions:
      - context7-codex
      - toolhive-codex
    mcpPolicy:
      allow:
        - github
        - filesystem
        - toolhive
        - context7
      deny:
        - publishing
    limits:
      maxConcurrentRuns: ${PROFILE_CODING_DAYTONA_CODEX_MAX_CONCURRENT_RUNS:?required}
      timeoutSeconds: ${PROFILE_CODING_DAYTONA_CODEX_TIMEOUT_SECONDS:?required}
      cpu: ${PROFILE_CODING_DAYTONA_CODEX_CPU_LIMIT:?required}
      memory: ${PROFILE_CODING_DAYTONA_CODEX_MEMORY_LIMIT:?required}
    runtimePackages:
      codex: ${PROFILE_CODING_DAYTONA_CODEX_PACKAGE_CODEX_VERSION:?required}
      toolhive: ${PROFILE_CODING_DAYTONA_CODEX_PACKAGE_TOOLHIVE_VERSION:?required}
    llmRouting:
      provider: 9router
      apiKeyRef: NINEROUTER_PROFILE_CODING_DAYTONA_CODEX_API_KEY
    toolRouting:
      provider: toolhive
      mcpUrlRef: MTE_AGENT_GATEWAY_TOOLHIVE_CODEX_URL
      bearerTokenRef: TOOLHIVE_PROFILE_CODING_DAYTONA_CODEX_BEARER_TOKEN
      servers:
        - id: coding-daytona-codex-tools
          endpointRef: MTE_AGENT_GATEWAY_TOOLHIVE_CODEX_URL
          credentialRef: TOOLHIVE_PROFILE_CODING_DAYTONA_CODEX_BEARER_TOKEN
          transport: streamable-http
          aggregation: toolhive-vmcp
          workloadRefs:
            - mte-profile-codex
            - mte-profile-codex-notion
          capabilities:
            - canary.echo
            - notion.tables.read
            - notion.documents.read
    toolDelivery:
      context7:
        mode: native_remote_mcp
        serverName: context7
        endpoint: ${MTE_CONTEXT7_MCP_URL:?required}
        authentication: optional_bearer_env
        runtimeConfigSource: nativeAdapterConfig.extraArgs
        tools:
          - resolve-library-id
          - query-docs
      profileTools:
        mode: native_remote_mcp
        serverName: mte-profile-tools
        endpointRef: MTE_AGENT_GATEWAY_TOOLHIVE_CODEX_URL
        bearerTokenEnv: MTE_TOOLHIVE_BEARER_TOKEN
        runtimeConfigSource: nativeAdapterConfig.extraArgs
        status: available
    authPolicy:
      oauthInImage: false
      persistentSecretsInImage: false
      runtimeSecretRefsOnly: true
    toolAccess:
      toolPolicyRef: postgres-ssot-notion-readonly-v1
      bundleId: mte-profile-coding-daytona-codex
      workloadId: mte-profile-codex
      endpointRef: MTE_AGENT_GATEWAY_TOOLHIVE_CODEX_URL
      credentialRef: TOOLHIVE_PROFILE_CODING_DAYTONA_CODEX_BEARER_TOKEN
      canaryTool: echo
      paperclipProfileRef: coding-daytona-codex
      kestraCatalogKey: mte.profile.catalog
      identityMode: mte_gateway_profile_bearer
      identityEnforcer: mte-agent-plane-gateway
      wrongProfileEndpointRef: MTE_AGENT_GATEWAY_TOOLHIVE_CLAUDE_URL
      nativeToolHiveOidcConfigured: false
      groupActsAsIdentity: false
      aggregateMode: toolhive-vmcp
      aggregateWorkloadIds:
        - mte-profile-codex
        - mte-profile-codex-notion
      notionWorkloadId: mte-profile-codex-notion
      notionRegistryPackage: io.github.stacklok/notion
      notionSecretRef: NOTION_TOKEN
      notionApiVersion: '2025-09-03'
      notionToolCount: 13
      notionRegistryToolCount: 22
      notionAccessMode: read_only
      notionRawCredentialInHarness: false
      notionWriteConnectorIdentity: mte.notion.connector
      capabilities:
        - canary.echo
        - notion.tables.read
        - notion.documents.read
  - ref: coding-daytona-claude
    title: Coding - Daytona / Claude Code
    role: engineer
    nativeAdapter: ${PROFILE_CODING_DAYTONA_CLAUDE_ADAPTER:?required}
    defaultEnvironment: ${PROFILE_CODING_DAYTONA_CLAUDE_DEFAULT_ENVIRONMENT:?required}
    workspaceMode: isolated_workspace
    runtimeContract:
      harnessKind: claude
      adapterType: ${PROFILE_CODING_DAYTONA_CLAUDE_ADAPTER:?required}
      protocol: anthropic-messages
      packageKey: claudeCode
      runtimeSecretEnv: ANTHROPIC_API_KEY
      envAllowlist:
        - ANTHROPIC_API_KEY
        - ANTHROPIC_BASE_URL
        - CONTEXT7_API_KEY
        - GH_TOKEN
        - GITHUB_TOKEN
        - MTE_AGENT_GATEWAY_TOOLHIVE_CLAUDE_URL
        - MTE_TOOLHIVE_BEARER_TOKEN
        - MTE_TOOLHIVE_BINDING_REF
        - MTE_TOOLHIVE_BUNDLE_ID
        - MTE_TOOLHIVE_CANARY_TOOL
        - MTE_TOOLHIVE_ENDPOINT_REF
        - MTE_TOOLHIVE_WORKLOAD_ID
        - MTE_TOOLHIVE_WRONG_PROFILE_MCP_URL
      providerManagedEnv: {}
      probe:
        helloCode: claude_hello_probe_passed
        acceptedWarnings:
          - claude_anthropic_api_key_overrides_subscription
    topology:
      wrongProfileRef: coding-daytona-pi
      toolhiveUpstreamRef: MTE_AGENT_GATEWAY_TOOLHIVE_CLAUDE_UPSTREAM
      toolhiveGatewayPortRef: MTE_AGENT_GATEWAY_TOOLHIVE_CLAUDE_PORT
      toolhiveProxyPortRef: TOOLHIVE_PROFILE_CODING_DAYTONA_CLAUDE_PROXY_PORT
      toolhiveIdentityPortRef: TOOLHIVE_PROFILE_CODING_DAYTONA_CLAUDE_EVERYTHING_PROXY_PORT
      toolhiveNotionPortRef: TOOLHIVE_PROFILE_CODING_DAYTONA_CLAUDE_NOTION_PROXY_PORT
    nativeAdapterConfig:
      cwd: /home/daytona/paperclip-workspace
      model: ${PROFILE_CODING_DAYTONA_CLAUDE_MODEL:?required}
      timeoutSec: ${PROFILE_CODING_DAYTONA_CLAUDE_TIMEOUT_SEC:?required}
      dangerouslySkipPermissions: true
    # Keep Paperclip's status-only recovery handoff on the same declared
    # 9router MiniMax route as the primary Claude Code run.
    paperclipRuntimeConfig:
      modelProfiles:
        cheap:
          enabled: true
          label: MTE 9router MiniMax recovery
          adapterConfig:
            model: ${PROFILE_CODING_DAYTONA_CLAUDE_MODEL:?required}
    instructions: instructions/coding.md
    skills:
      - verification-before-completion
    extensions:
      - context7-claude
      - toolhive-claude
    mcpPolicy:
      allow:
        - github
        - filesystem
        - toolhive
        - context7
      deny:
        - publishing
    limits:
      maxConcurrentRuns: ${PROFILE_CODING_DAYTONA_CLAUDE_MAX_CONCURRENT_RUNS:?required}
      timeoutSeconds: ${PROFILE_CODING_DAYTONA_CLAUDE_TIMEOUT_SECONDS:?required}
      cpu: ${PROFILE_CODING_DAYTONA_CLAUDE_CPU_LIMIT:?required}
      memory: ${PROFILE_CODING_DAYTONA_CLAUDE_MEMORY_LIMIT:?required}
    runtimePackages:
      claudeCode: ${PROFILE_CODING_DAYTONA_CLAUDE_PACKAGE_CLAUDECODE_VERSION:?required}
      toolhive: ${PROFILE_CODING_DAYTONA_CLAUDE_PACKAGE_TOOLHIVE_VERSION:?required}
    llmRouting:
      provider: 9router
      apiKeyRef: NINEROUTER_PROFILE_CODING_DAYTONA_CLAUDE_API_KEY
    toolRouting:
      provider: toolhive
      mcpUrlRef: MTE_AGENT_GATEWAY_TOOLHIVE_CLAUDE_URL
      bearerTokenRef: TOOLHIVE_PROFILE_CODING_DAYTONA_CLAUDE_BEARER_TOKEN
      servers:
        - id: coding-daytona-claude-tools
          endpointRef: MTE_AGENT_GATEWAY_TOOLHIVE_CLAUDE_URL
          credentialRef: TOOLHIVE_PROFILE_CODING_DAYTONA_CLAUDE_BEARER_TOKEN
          transport: streamable-http
          aggregation: toolhive-vmcp
          workloadRefs:
            - mte-profile-claude
            - mte-profile-claude-notion
          capabilities:
            - canary.echo
            - notion.tables.read
            - notion.documents.read
    toolDelivery:
      context7:
        mode: native_remote_mcp
        serverName: context7
        endpoint: ${MTE_CONTEXT7_MCP_URL:?required}
        authentication: optional_bearer_env
        configPath: /etc/claude-code/managed-mcp.json
        tools:
          - resolve-library-id
          - query-docs
      profileTools:
        mode: native_remote_mcp
        serverName: mte-profile-tools
        endpointRef: MTE_AGENT_GATEWAY_TOOLHIVE_CLAUDE_URL
        bearerTokenEnv: MTE_TOOLHIVE_BEARER_TOKEN
        configPath: /etc/claude-code/managed-mcp.json
        status: available
    authPolicy:
      oauthInImage: false
      persistentSecretsInImage: false
      runtimeSecretRefsOnly: true
    toolAccess:
      toolPolicyRef: postgres-ssot-notion-readonly-v1
      bundleId: mte-profile-coding-daytona-claude
      workloadId: mte-profile-claude
      endpointRef: MTE_AGENT_GATEWAY_TOOLHIVE_CLAUDE_URL
      credentialRef: TOOLHIVE_PROFILE_CODING_DAYTONA_CLAUDE_BEARER_TOKEN
      canaryTool: echo
      paperclipProfileRef: coding-daytona-claude
      kestraCatalogKey: mte.profile.catalog
      identityMode: mte_gateway_profile_bearer
      identityEnforcer: mte-agent-plane-gateway
      wrongProfileEndpointRef: MTE_AGENT_GATEWAY_TOOLHIVE_PI_URL
      nativeToolHiveOidcConfigured: false
      groupActsAsIdentity: false
      aggregateMode: toolhive-vmcp
      aggregateWorkloadIds:
        - mte-profile-claude
        - mte-profile-claude-notion
      notionWorkloadId: mte-profile-claude-notion
      notionRegistryPackage: io.github.stacklok/notion
      notionSecretRef: NOTION_TOKEN
      notionApiVersion: '2025-09-03'
      notionToolCount: 13
      notionRegistryToolCount: 22
      notionAccessMode: read_only
      notionRawCredentialInHarness: false
      notionWriteConnectorIdentity: mte.notion.connector
      capabilities:
        - canary.echo
        - notion.tables.read
        - notion.documents.read
  - ref: coding-daytona-pi
    title: Coding - Daytona / Pi
    role: engineer
    nativeAdapter: ${PROFILE_CODING_DAYTONA_PI_ADAPTER:?required}
    defaultEnvironment: ${PROFILE_CODING_DAYTONA_PI_DEFAULT_ENVIRONMENT:?required}
    workspaceMode: isolated_workspace
    runtimeContract:
      harnessKind: pi
      adapterType: ${PROFILE_CODING_DAYTONA_PI_ADAPTER:?required}
      protocol: openai-chat-completions
      packageKey: pi
      runtimeSecretEnv: OPENAI_API_KEY
      envAllowlist:
        - CONTEXT7_API_KEY
        - GH_TOKEN
        - GITHUB_TOKEN
        - MTE_AGENT_GATEWAY_TOOLHIVE_PI_URL
        - MTE_TOOLHIVE_BEARER_TOKEN
        - MTE_TOOLHIVE_BINDING_REF
        - MTE_TOOLHIVE_BUNDLE_ID
        - MTE_TOOLHIVE_CANARY_TOOL
        - MTE_TOOLHIVE_ENDPOINT_REF
        - MTE_TOOLHIVE_WORKLOAD_ID
        - MTE_TOOLHIVE_WRONG_PROFILE_MCP_URL
        - OPENAI_API_KEY
        - OPENAI_BASE_URL
        - PAPERCLIP_PI_PROVIDERS
        - PI_CODING_AGENT_DIR
      providerManagedEnv: {}
      probe:
        helloCode: pi_hello_probe_passed
        acceptedWarnings: []
    topology:
      wrongProfileRef: coding-daytona-codex
      toolhiveUpstreamRef: MTE_AGENT_GATEWAY_TOOLHIVE_PI_UPSTREAM
      toolhiveGatewayPortRef: MTE_AGENT_GATEWAY_TOOLHIVE_PI_PORT
      toolhiveProxyPortRef: TOOLHIVE_PROFILE_CODING_DAYTONA_PI_PROXY_PORT
      toolhiveIdentityPortRef: TOOLHIVE_PROFILE_CODING_DAYTONA_PI_EVERYTHING_PROXY_PORT
      toolhiveNotionPortRef: TOOLHIVE_PROFILE_CODING_DAYTONA_PI_NOTION_PROXY_PORT
    nativeAdapterConfig:
      cwd: /home/daytona/paperclip-workspace
      provider: ${PROFILE_CODING_DAYTONA_PI_PROVIDER:?required}
      model: ${PROFILE_CODING_DAYTONA_PI_MODEL:?required}
      # Pi has the same fresh-session gap as Codex in Paperclip 2026.707.0.
      bootstrapPromptTemplate: '{{context.paperclipTaskMarkdown}}'
      timeoutSec: ${PROFILE_CODING_DAYTONA_PI_TIMEOUT_SEC:?required}
    # Pi 2026.707.0 does not advertise a `cheap` profile. Paperclip therefore
    # falls back to this primary adapter config without applying an override.
    paperclipRuntimeConfig:
      modelProfiles: {}
    instructions: instructions/coding.md
    skills:
      - verification-before-completion
    extensions:
      - context7-pi
      - toolhive-pi
    mcpPolicy:
      allow:
        - github
        - filesystem
        - context7-pi-extension
        - toolhive-pi-extension
      deny:
        - publishing
    limits:
      maxConcurrentRuns: ${PROFILE_CODING_DAYTONA_PI_MAX_CONCURRENT_RUNS:?required}
      timeoutSeconds: ${PROFILE_CODING_DAYTONA_PI_TIMEOUT_SECONDS:?required}
      cpu: ${PROFILE_CODING_DAYTONA_PI_CPU_LIMIT:?required}
      memory: ${PROFILE_CODING_DAYTONA_PI_MEMORY_LIMIT:?required}
    runtimePackages:
      pi: ${PROFILE_CODING_DAYTONA_PI_PACKAGE_PI_VERSION:?required}
      toolhive: ${PROFILE_CODING_DAYTONA_PI_PACKAGE_TOOLHIVE_VERSION:?required}
    llmRouting:
      provider: 9router
      apiKeyRef: NINEROUTER_PROFILE_CODING_DAYTONA_PI_API_KEY
    toolRouting:
      provider: toolhive
      harnessDeliveryStatus: available
      failClosed: true
      mcpUrlRef: MTE_AGENT_GATEWAY_TOOLHIVE_PI_URL
      bearerTokenRef: TOOLHIVE_PROFILE_CODING_DAYTONA_PI_BEARER_TOKEN
      servers:
        - id: coding-daytona-pi-tools
