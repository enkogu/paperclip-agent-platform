name: mte-9router
x-logging: &id001
  driver: json-file
  options:
    max-size: ${MTE_DOCKER_LOG_MAX_SIZE:?required}
    max-file: ${MTE_DOCKER_LOG_MAX_FILES:?required}
services:
  9router:
    image: ${MTE_9ROUTER_9ROUTER_IMAGE:?required}
    environment:
      DATA_DIR: /app/data
      PORT: ${MTE_9ROUTER_9ROUTER_ENV_PORT:?required}
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      INITIAL_PASSWORD: ${NINEROUTER_INITIAL_PASSWORD:?required}
      JWT_SECRET: ${NINEROUTER_JWT_SECRET:?required}
      API_KEY_SECRET: ${NINEROUTER_API_KEY_SECRET:?required}
      MACHINE_ID_SALT: ${NINEROUTER_MACHINE_ID_SALT:?required}
      REQUIRE_API_KEY: 'true'
    volumes:
    - ninerouter-data:/app/data
    ports:
    - ${MTE_9ROUTER_9ROUTER_PORT_1_MAPPING:?required}
    networks:
      llm:
        aliases:
        - 9router
      agent-plane:
        aliases:
        - 9router
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - fetch('http://127.0.0.1:' + process.env.PORT + '/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: ${MTE_HEALTHCHECK_STANDARD_INTERVAL:?required}
      timeout: ${MTE_HEALTHCHECK_STANDARD_TIMEOUT:?required}
      retries: ${MTE_HEALTHCHECK_STANDARD_RETRIES:?required}
      start_period: ${MTE_HEALTHCHECK_STANDARD_START_PERIOD:?required}
    restart: unless-stopped
    cpus: ${NINEROUTER_CPU_LIMIT:?required}
    mem_limit: ${NINEROUTER_MEMORY_LIMIT:?required}
    pids_limit: ${MTE_PIDS_APP_LIMIT:?required}
    logging: *id001
volumes:
  ninerouter-data:
    name: mte-9router-data
networks:
  llm:
    name: mte-llm
  agent-plane:
    name: ${MTE_AGENT_PLANE_NETWORK:?required}
    external: true
