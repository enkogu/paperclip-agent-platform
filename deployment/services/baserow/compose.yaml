name: mte-baserow
x-logging: &id001
  driver: json-file
  options:
    max-size: 10m
    max-file: '5'
services:
  redis:
    image: ${MTE_BASEROW_REDIS_IMAGE:?required}
    user: 999:1000
    environment:
      BASEROW_REDIS_PASSWORD: ${BASEROW_REDIS_PASSWORD:?required}
    command:
    - /bin/sh
    - -ec
    - "umask 077\npassword=$$(printenv BASEROW_REDIS_PASSWORD)\ntest -n \"$$password\"\
      \nconfig=/run/mte-baserow-redis/redis.conf\n{\n  printf '%s\\n' 'appendonly\
      \ yes' 'save 60 1' 'databases 16'\n  printf 'requirepass %s\\n' \"$$password\"\
      \n} > \"$$config\"\nchmod 0600 \"$$config\"\nunset password BASEROW_REDIS_PASSWORD\n\
      exec redis-server \"$$config\""
    tmpfs:
    - /run/mte-baserow-redis:rw,noexec,nosuid,nodev,mode=0700,uid=999,gid=1000
    volumes:
    - redis-data:/data
    networks:
      baserow:
        aliases:
        - redis
    healthcheck:
      test:
      - CMD-SHELL
      - REDISCLI_AUTH="$${BASEROW_REDIS_PASSWORD:?required}" redis-cli ping | grep
        -q PONG
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s
    restart: unless-stopped
    cpus: ${BASEROW_REDIS_CPU_LIMIT:?required}
    mem_limit: ${BASEROW_REDIS_MEMORY_LIMIT:?required}
    pids_limit: 128
    logging: *id001
    ports: []
  baserow:
    image: ${MTE_BASEROW_BASEROW_IMAGE:?required}
    environment:
      BASEROW_PUBLIC_URL: ${BASEROW_PUBLIC_URL:?required}
      BASEROW_CADDY_ADDRESSES: :80
      SECRET_KEY: ${BASEROW_SECRET_KEY:?required}
      DATABASE_URL: ${BASEROW_DATABASE_URL:?required}
      REDIS_URL: ${BASEROW_REDIS_URL:?required}
    ports:
    - ${MTE_BASEROW_BASEROW_PORT_1_MAPPING:?required}
    volumes:
    - baserow-data:/baserow/data
    networks:
      baserow:
        aliases:
        - baserow
      data-plane: {}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://127.0.0.1/api/_health/ >/dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 180s
    restart: unless-stopped
    stop_grace_period: 120s
    cpus: ${BASEROW_CPU_LIMIT:?required}
    mem_limit: ${BASEROW_MEMORY_LIMIT:?required}
    pids_limit: 768
    logging: *id001
volumes:
  baserow-data:
    name: mte-baserow-data
  redis-data:
    name: mte-baserow-redis
networks:
  baserow:
    name: mte-baserow
  data-plane:
    name: mte-data-plane
    external: true
