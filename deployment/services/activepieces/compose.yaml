name: mte-activepieces
x-logging: &id001
  driver: json-file
  options:
    max-size: 10m
    max-file: '5'
x-activepieces-env:
  AP_ENVIRONMENT: prod
  AP_FRONTEND_URL: ${AP_FRONTEND_URL:?required}
  AP_ENCRYPTION_KEY: ${AP_ENCRYPTION_KEY:?required}
  AP_JWT_SECRET: ${AP_JWT_SECRET:?required}
  AP_DB_TYPE: POSTGRES
  AP_POSTGRES_HOST: mte-activepieces-postgres
  AP_POSTGRES_PORT: '5432'
  AP_POSTGRES_DATABASE: ${AP_POSTGRES_DATABASE:?required}
  AP_POSTGRES_USERNAME: ${AP_POSTGRES_USERNAME:?required}
  AP_POSTGRES_PASSWORD: ${AP_POSTGRES_PASSWORD:?required}
  AP_REDIS_TYPE: STANDALONE
  AP_REDIS_URL: redis://:${AP_REDIS_PASSWORD:?required}@mte-activepieces-redis:6379/0
  AP_EXECUTION_MODE: SANDBOX_CODE_ONLY
  AP_NETWORK_MODE: STRICT
  AP_WORKER_CONCURRENCY: '1'
  AP_DEFAULT_CONCURRENT_JOBS_LIMIT: '1'
  AP_SANDBOX_MEMORY_LIMIT: '262144'
  AP_FLOW_TIMEOUT_SECONDS: '300'
  AP_QUEUE_UI_ENABLED: 'false'
  AP_TELEMETRY_ENABLED: 'false'
  AP_CLOUD_AUTH_ENABLED: 'false'
  AP_TOOL_SEARCH_ENABLED: 'false'
  AP_FILE_STORAGE_LOCATION: DB
services:
  app:
    image: ${MTE_ACTIVEPIECES_APP_IMAGE:?required}
    environment:
      AP_ENVIRONMENT: prod
      AP_FRONTEND_URL: ${AP_FRONTEND_URL:?required}
      AP_ENCRYPTION_KEY: ${AP_ENCRYPTION_KEY:?required}
      AP_JWT_SECRET: ${AP_JWT_SECRET:?required}
      AP_DB_TYPE: POSTGRES
      AP_POSTGRES_HOST: ${MTE_ACTIVEPIECES_APP_ENV_AP_POSTGRES_HOST:?required}
      AP_POSTGRES_PORT: ${MTE_ACTIVEPIECES_APP_ENV_AP_POSTGRES_PORT:?required}
      AP_POSTGRES_DATABASE: ${AP_POSTGRES_DATABASE:?required}
      AP_POSTGRES_USERNAME: ${AP_POSTGRES_USERNAME:?required}
      AP_POSTGRES_PASSWORD: ${AP_POSTGRES_PASSWORD:?required}
      AP_REDIS_TYPE: STANDALONE
      AP_REDIS_URL: ${AP_REDIS_URL:?required}
      AP_EXECUTION_MODE: ${MTE_ACTIVEPIECES_APP_ENV_AP_EXECUTION_MODE:?required}
      AP_NETWORK_MODE: ${MTE_ACTIVEPIECES_APP_ENV_AP_NETWORK_MODE:?required}
      AP_WORKER_CONCURRENCY: ${MTE_ACTIVEPIECES_APP_ENV_AP_WORKER_CONCURRENCY:?required}
      AP_DEFAULT_CONCURRENT_JOBS_LIMIT: ${MTE_ACTIVEPIECES_APP_ENV_AP_DEFAULT_CONCURRENT_JOBS_LIMIT:?required}
      AP_SANDBOX_MEMORY_LIMIT: ${MTE_ACTIVEPIECES_APP_ENV_AP_SANDBOX_MEMORY_LIMIT:?required}
      AP_FLOW_TIMEOUT_SECONDS: '300'
      AP_QUEUE_UI_ENABLED: ${MTE_ACTIVEPIECES_APP_ENV_AP_QUEUE_UI_ENABLED:?required}
      AP_TELEMETRY_ENABLED: ${MTE_ACTIVEPIECES_APP_ENV_AP_TELEMETRY_ENABLED:?required}
      AP_CLOUD_AUTH_ENABLED: ${MTE_ACTIVEPIECES_APP_ENV_AP_CLOUD_AUTH_ENABLED:?required}
      AP_TOOL_SEARCH_ENABLED: ${MTE_ACTIVEPIECES_APP_ENV_AP_TOOL_SEARCH_ENABLED:?required}
      AP_FILE_STORAGE_LOCATION: DB
      AP_CONTAINER_TYPE: APP
    ports:
    - ${MTE_ACTIVEPIECES_APP_PORT_1_MAPPING:?required}
    volumes:
    - activepieces-cache:/usr/src/app/cache
    networks:
      activepieces-data:
        aliases:
        - mte-activepieces-app
      data-plane: {}
      tool-plane:
        aliases:
        - activepieces
    healthcheck:
      test:
      - CMD-SHELL
      - node -e "fetch('http://127.0.0.1:80/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 90s
    restart: unless-stopped
    stop_grace_period: 90s
    cpus: ${AP_APP_CPU_LIMIT:?required}
    mem_limit: ${AP_APP_MEMORY_LIMIT:?required}
    pids_limit: 768
    logging: *id001
  worker:
    image: ${MTE_ACTIVEPIECES_WORKER_IMAGE:?required}
    environment:
      AP_ENVIRONMENT: prod
      AP_FRONTEND_URL: ${MTE_ACTIVEPIECES_WORKER_ENV_AP_FRONTEND_URL:?required}
      AP_ENCRYPTION_KEY: ${AP_ENCRYPTION_KEY:?required}
      AP_JWT_SECRET: ${AP_JWT_SECRET:?required}
      AP_DB_TYPE: POSTGRES
      AP_POSTGRES_HOST: ${MTE_ACTIVEPIECES_WORKER_ENV_AP_POSTGRES_HOST:?required}
      AP_POSTGRES_PORT: ${MTE_ACTIVEPIECES_WORKER_ENV_AP_POSTGRES_PORT:?required}
      AP_POSTGRES_DATABASE: ${AP_POSTGRES_DATABASE:?required}
      AP_POSTGRES_USERNAME: ${AP_POSTGRES_USERNAME:?required}
      AP_POSTGRES_PASSWORD: ${AP_POSTGRES_PASSWORD:?required}
      AP_REDIS_TYPE: STANDALONE
      AP_REDIS_URL: ${AP_REDIS_URL:?required}
      AP_EXECUTION_MODE: ${MTE_ACTIVEPIECES_WORKER_ENV_AP_EXECUTION_MODE:?required}
      AP_NETWORK_MODE: ${MTE_ACTIVEPIECES_WORKER_ENV_AP_NETWORK_MODE:?required}
      AP_WORKER_CONCURRENCY: ${MTE_ACTIVEPIECES_WORKER_ENV_AP_WORKER_CONCURRENCY:?required}
      AP_DEFAULT_CONCURRENT_JOBS_LIMIT: ${MTE_ACTIVEPIECES_WORKER_ENV_AP_DEFAULT_CONCURRENT_JOBS_LIMIT:?required}
      AP_SANDBOX_MEMORY_LIMIT: ${MTE_ACTIVEPIECES_WORKER_ENV_AP_SANDBOX_MEMORY_LIMIT:?required}
      AP_FLOW_TIMEOUT_SECONDS: '300'
      AP_QUEUE_UI_ENABLED: ${MTE_ACTIVEPIECES_WORKER_ENV_AP_QUEUE_UI_ENABLED:?required}
      AP_TELEMETRY_ENABLED: ${MTE_ACTIVEPIECES_WORKER_ENV_AP_TELEMETRY_ENABLED:?required}
      AP_CLOUD_AUTH_ENABLED: ${MTE_ACTIVEPIECES_WORKER_ENV_AP_CLOUD_AUTH_ENABLED:?required}
      AP_TOOL_SEARCH_ENABLED: ${MTE_ACTIVEPIECES_WORKER_ENV_AP_TOOL_SEARCH_ENABLED:?required}
      AP_FILE_STORAGE_LOCATION: DB
      AP_CONTAINER_TYPE: WORKER
    volumes:
    - activepieces-cache:/usr/src/app/cache
    networks:
    - activepieces-data
    - data-plane
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - process.kill(1,0)
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    stop_grace_period: 120s
    cpus: ${AP_WORKER_CPU_LIMIT:?required}
    mem_limit: ${AP_WORKER_MEMORY_LIMIT:?required}
    pids_limit: 768
    logging: *id001
    ports: []
volumes:
  activepieces-cache:
    name: mte-activepieces-cache
networks:
  activepieces-data:
    name: mte-activepieces-data
    external: true
  tool-plane:
    name: mte-tool-plane
    external: true
  data-plane:
    name: mte-data-plane
    external: true
