name: mte-firecrawl
x-logging: &id001
  driver: json-file
  options:
    max-size: ${MTE_DOCKER_LOG_MAX_SIZE:?required}
    max-file: ${MTE_DOCKER_LOG_MAX_FILES:?required}
    compress: 'true'
services:
  api:
    image: ${MTE_FIRECRAWL_API_IMAGE:?required}
    environment:
      REDIS_URL: ${FIRECRAWL_REDIS_URL:?required}
      REDIS_RATE_LIMIT_URL: ${FIRECRAWL_REDIS_URL:?required}
      PLAYWRIGHT_MICROSERVICE_URL: ${MTE_FIRECRAWL_API_ENV_PLAYWRIGHT_MICROSERVICE_URL:?required}
      POSTGRES_USER: ${FIRECRAWL_DB_USER:?required}
      POSTGRES_PASSWORD: ${FIRECRAWL_DB_PASSWORD:?required}
      POSTGRES_DB: ${FIRECRAWL_DB_NAME:?required}
      POSTGRES_HOST: ${MTE_FIRECRAWL_API_ENV_POSTGRES_HOST:?required}
      POSTGRES_PORT: ${MTE_FIRECRAWL_API_ENV_POSTGRES_PORT:?required}
      USE_DB_AUTHENTICATION: 'false'
      NUM_WORKERS_PER_QUEUE: ${FIRECRAWL_WORKERS_PER_QUEUE:?required}
      CRAWL_CONCURRENT_REQUESTS: ${FIRECRAWL_CRAWL_CONCURRENCY:?required}
      MAX_CONCURRENT_JOBS: ${FIRECRAWL_MAX_JOBS:?required}
      BROWSER_POOL_SIZE: ${FIRECRAWL_BROWSER_POOL_SIZE:?required}
      SEARXNG_ENDPOINT: ${MTE_FIRECRAWL_API_ENV_SEARXNG_ENDPOINT:?required}
      LOGGING_LEVEL: ${FIRECRAWL_LOG_LEVEL:?required}
      HOST: ${MTE_FIRECRAWL_API_ENV_HOST:?required}
      PORT: ${MTE_FIRECRAWL_API_ENV_PORT:?required}
      EXTRACT_WORKER_PORT: ${MTE_FIRECRAWL_API_ENV_EXTRACT_WORKER_PORT:?required}
      WORKER_PORT: ${MTE_FIRECRAWL_API_ENV_WORKER_PORT:?required}
      NUQ_RABBITMQ_URL: ${MTE_FIRECRAWL_API_ENV_NUQ_RABBITMQ_URL:?required}
      HARNESS_STARTUP_TIMEOUT_MS: '300000'
      ENV: local
    command:
    - node
    - dist/src/harness.js
    - --start-docker
    ports:
    - ${MTE_FIRECRAWL_API_PORT_1_MAPPING:?required}
    networks:
      firecrawl: {}
      search: {}
      tool-runtime:
        aliases:
        - firecrawl-api
    depends_on:
      redis:
        condition: service_healthy
      playwright-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nuq-postgres:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - node -e "fetch('http://127.0.0.1:3002/').then(r=>{if(r.status>=500)process.exit(1)}).catch(()=>process.exit(1))"
      interval: ${MTE_HEALTHCHECK_SLOW_INTERVAL:?required}
      timeout: ${MTE_HEALTHCHECK_SLOW_TIMEOUT:?required}
      retries: ${MTE_HEALTHCHECK_SLOW_RETRIES:?required}
      start_period: ${MTE_HEALTHCHECK_SLOW_START_PERIOD:?required}
    restart: unless-stopped
    stop_grace_period: 90s
    cpus: ${FIRECRAWL_API_CPU_LIMIT:?required}
    mem_limit: ${FIRECRAWL_API_MEMORY_LIMIT:?required}
    pids_limit: ${MTE_PIDS_APP_LIMIT:?required}
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    logging: *id001
  playwright-service:
    image: ${MTE_FIRECRAWL_PLAYWRIGHT_SERVICE_IMAGE:?required}
    environment:
      PORT: ${MTE_FIRECRAWL_PLAYWRIGHT_SERVICE_ENV_PORT:?required}
      MAX_CONCURRENT_PAGES: ${FIRECRAWL_CRAWL_CONCURRENCY:?required}
      BLOCK_MEDIA: 'true'
    networks:
    - firecrawl
    healthcheck:
      test:
      - CMD-SHELL
      - node -e "fetch('http://127.0.0.1:3000/').then(()=>{}).catch(()=>process.exit(1))"
      interval: ${MTE_HEALTHCHECK_SLOW_INTERVAL:?required}
      timeout: ${MTE_HEALTHCHECK_SLOW_TIMEOUT:?required}
      retries: ${MTE_HEALTHCHECK_SLOW_RETRIES:?required}
      start_period: ${MTE_HEALTHCHECK_SLOW_START_PERIOD:?required}
    tmpfs:
    - /tmp/.cache:noexec,nosuid,size=512m
    restart: unless-stopped
    cpus: ${FIRECRAWL_BROWSER_CPU_LIMIT:?required}
    mem_limit: ${FIRECRAWL_BROWSER_MEMORY_LIMIT:?required}
    pids_limit: ${MTE_PIDS_BROWSER_LIMIT:?required}
    logging: *id001
    ports: []
  redis:
    # Preserve Firecrawl's Redis-protocol hostname and named volume while the
    # datastore implementation moves to BSD-licensed Valkey.
    image: ${MTE_FIRECRAWL_VALKEY_IMAGE:?required}
    environment:
      FIRECRAWL_REDIS_PASSWORD: ${FIRECRAWL_REDIS_PASSWORD:?required}
    user: 999:1000
    command:
    - /bin/sh
    - -euc
    - 'umask 077

      test -n "$(printenv FIRECRAWL_REDIS_PASSWORD)"

      printf ''appendonly yes\nsave 60 1\nrequirepass %s\n'' "$(printenv FIRECRAWL_REDIS_PASSWORD)"
      > /tmp/mte-firecrawl-redis.conf

      unset FIRECRAWL_REDIS_PASSWORD

      exec valkey-server /tmp/mte-firecrawl-redis.conf

      '
    tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,mode=1777
    volumes:
    - firecrawl-valkey:/data
    networks:
    - firecrawl
    healthcheck:
      test:
      - CMD-SHELL
      - VALKEYCLI_AUTH="$${FIRECRAWL_REDIS_PASSWORD:?required}" valkey-cli ping | grep
        -q PONG
      interval: ${MTE_HEALTHCHECK_FAST_INTERVAL:?required}
      timeout: ${MTE_HEALTHCHECK_FAST_TIMEOUT:?required}
      retries: ${MTE_HEALTHCHECK_FAST_RETRIES:?required}
    restart: unless-stopped
    cpus: ${FIRECRAWL_REDIS_CPU_LIMIT:?required}
    mem_limit: ${FIRECRAWL_REDIS_MEMORY_LIMIT:?required}
    pids_limit: ${MTE_PIDS_LIGHTWEIGHT_LIMIT:?required}
    logging: *id001
    ports: []
  rabbitmq:
    image: ${MTE_FIRECRAWL_RABBITMQ_IMAGE:?required}
    volumes:
    - firecrawl-rabbitmq:/var/lib/rabbitmq
    networks:
    - firecrawl
    healthcheck:
      test:
      - CMD
      - nc
      - -z
      - 127.0.0.1
      - '5672'
      interval: ${MTE_HEALTHCHECK_SLOW_INTERVAL:?required}
      timeout: ${MTE_HEALTHCHECK_SLOW_TIMEOUT:?required}
      retries: ${MTE_HEALTHCHECK_SLOW_RETRIES:?required}
      start_period: ${MTE_HEALTHCHECK_SLOW_START_PERIOD:?required}
    restart: unless-stopped
    cpus: ${FIRECRAWL_RABBIT_CPU_LIMIT:?required}
    mem_limit: ${FIRECRAWL_RABBIT_MEMORY_LIMIT:?required}
    pids_limit: ${MTE_PIDS_DATASTORE_LIMIT:?required}
    logging: *id001
    ports: []
  nuq-postgres:
    image: ${MTE_FIRECRAWL_NUQ_POSTGRES_IMAGE:?required}
    environment:
      POSTGRES_USER: ${FIRECRAWL_DB_USER:?required}
      POSTGRES_PASSWORD: ${FIRECRAWL_DB_PASSWORD:?required}
      POSTGRES_DB: ${FIRECRAWL_DB_NAME:?required}
    command:
    - postgres
    - -c
    - cron.database_name=${FIRECRAWL_DB_NAME:?required}
    volumes:
    - firecrawl-postgres:/var/lib/postgresql/data
    networks:
    - firecrawl
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${FIRECRAWL_DB_USER:?required} -d ${FIRECRAWL_DB_NAME:?required}
      interval: ${MTE_HEALTHCHECK_FAST_INTERVAL:?required}
      timeout: ${MTE_HEALTHCHECK_FAST_TIMEOUT:?required}
      retries: ${MTE_HEALTHCHECK_FAST_RETRIES:?required}
      start_period: ${MTE_HEALTHCHECK_FAST_START_PERIOD:?required}
    restart: unless-stopped
    cpus: ${FIRECRAWL_DB_CPU_LIMIT:?required}
    mem_limit: ${FIRECRAWL_DB_MEMORY_LIMIT:?required}
    pids_limit: ${MTE_PIDS_DATASTORE_LIMIT:?required}
    logging: *id001
    ports: []
volumes:
  firecrawl-valkey:
    name: mte-firecrawl-valkey
  firecrawl-rabbitmq:
    name: mte-firecrawl-rabbitmq
  firecrawl-postgres:
    name: mte-firecrawl-postgres
networks:
  firecrawl:
    name: mte-firecrawl
  search:
    name: mte-search
    external: true
  tool-runtime:
    name: ${MTE_TOOL_RUNTIME_NETWORK:?required}
    external: true
