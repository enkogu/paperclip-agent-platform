use_default_settings: true

general:
  instance_name: "MTE SearXNG"

server:
  secret_key: "${SEARXNG_SECRET}"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: true

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

valkey:
  url: "${SEARXNG_VALKEY_URL}"
