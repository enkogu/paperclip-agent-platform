name: mte-nocodb
services:
  nocodb:
    image: ${MTE_NOCODB_NOCODB_IMAGE:?required}
    environment:
      NC_DB: ${NOCODB_META_DSN:?required}
      NC_PUBLIC_URL: ${NOCODB_PUBLIC_URL:?required}
      NC_AUTH_JWT_SECRET: ${NOCODB_JWT_SECRET:?required}
      NC_DISABLE_TELE: 'true'
      NC_ALLOW_LOCAL_EXTERNAL_DBS: 'true'
      NC_DISABLE_PG_DATA_REFLECTION: 'true'
      NC_DOCS_REALTIME: 'false'
      NC_DISABLE_DB_SSL_FILE_PATHS: 'true'
      NC_LICENSE_KEY: ${NOCODB_LICENSE_KEY:?required}
    ports:
    - ${MTE_NOCODB_NOCODB_PORT_1_MAPPING:?required}
    networks:
      data-plane:
        aliases:
        - nocodb
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q -O /dev/null http://127.0.0.1:8080/api/v1/health || exit 1
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 90s
    volumes:
    - nocodb-data:/usr/app/data
    restart: unless-stopped
    stop_grace_period: 90s
    pids_limit: ${NOCODB_PIDS_LIMIT:?required}
    security_opt:
    - no-new-privileges:true
    cpus: ${NOCODB_CPU_LIMIT:?required}
    mem_limit: ${NOCODB_MEMORY_LIMIT:?required}
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'
volumes:
  nocodb-data:
    name: mte-nocodb-data
networks:
  data-plane:
    name: mte-data-plane
    external: true
