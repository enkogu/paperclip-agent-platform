name: mte-activepieces-data
x-logging: &id001
  driver: json-file
  options:
    max-size: 10m
    max-file: '5'
services:
  postgres:
    image: ${MTE_ACTIVEPIECES_DATA_POSTGRES_IMAGE:?required}
    environment:
      POSTGRES_DB: ${AP_POSTGRES_DATABASE:?required}
      POSTGRES_USER: ${AP_POSTGRES_USERNAME:?required}
      POSTGRES_PASSWORD: ${AP_POSTGRES_PASSWORD:?required}
    volumes:
    - activepieces-postgres:/var/lib/postgresql/data
    networks:
      activepieces-data:
        aliases:
        - mte-activepieces-postgres
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${AP_POSTGRES_USERNAME:?required} -d ${AP_POSTGRES_DATABASE:?required}
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 60s
    cpus: ${AP_POSTGRES_CPU_LIMIT:?required}
    mem_limit: ${AP_POSTGRES_MEMORY_LIMIT:?required}
    pids_limit: 256
    logging: *id001
    ports: []
  redis:
    image: ${MTE_ACTIVEPIECES_DATA_REDIS_IMAGE:?required}
    user: 999:1000
    command:
    - /bin/sh
    - -ec
    - "umask 077\nsecret=/run/mte-activepieces-redis/redis.password\nconfig=/run/mte-activepieces-redis/redis.conf\n\
      password=$$(printenv AP_REDIS_PASSWORD)\ntest -n \"$$password\"\nprintf '%s'\
      \ \"$$password\" > \"$$secret\"\nchmod 0400 \"$$secret\"\nunset password AP_REDIS_PASSWORD\n\
      {\n  printf '%s\\n' 'appendonly yes' 'save 60 1'\n  printf 'requirepass %s\\\
      n' \"$$(cat \"$$secret\")\"\n} > \"$$config\"\nchmod 0600 \"$$config\"\nexec\
      \ redis-server \"$$config\"\n"
    tmpfs:
    - /run/mte-activepieces-redis:rw,noexec,nosuid,nodev,mode=0700,uid=999,gid=1000
    security_opt:
    - no-new-privileges:true
    volumes:
    - activepieces-redis:/data
    networks:
      activepieces-data:
        aliases:
        - mte-activepieces-redis
    healthcheck:
      test:
      - CMD-SHELL
      - test -r /run/mte-activepieces-redis/redis.password && REDISCLI_AUTH="$$(cat
        /run/mte-activepieces-redis/redis.password)" redis-cli ping | grep -qx PONG
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      AP_REDIS_PASSWORD: ${AP_REDIS_PASSWORD:?required}
    restart: unless-stopped
    cpus: ${AP_REDIS_CPU_LIMIT:?required}
    mem_limit: ${AP_REDIS_MEMORY_LIMIT:?required}
    pids_limit: 128
    logging: *id001
    ports: []
volumes:
  activepieces-postgres:
    name: mte-activepieces-postgres
  activepieces-redis:
    name: mte-activepieces-redis
networks:
  activepieces-data:
    name: mte-activepieces-data
