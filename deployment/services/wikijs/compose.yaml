name: mte-wikijs
x-logging: &id001
  driver: json-file
  options:
    max-size: 10m
    max-file: '5'
services:
  wiki:
    image: ${MTE_WIKIJS_WIKI_IMAGE:?required}
    environment:
      DB_TYPE: postgres
      DB_HOST: ${WIKIJS_DB_HOST:?required}
      DB_PORT: ${WIKIJS_DB_PORT:?required}
      DB_USER: ${WIKIJS_DB_USER:?required}
      DB_PASS: ${WIKIJS_DB_PASSWORD:?required}
      DB_NAME: ${WIKIJS_DB_NAME:?required}
      DB_SSL: 'false'
      HA_ACTIVE: 'false'
      LOG_LEVEL: info
      LOG_FORMAT: json
    expose:
    - '3000'
    ports:
    - ${MTE_WIKIJS_WIKI_PORT_1_MAPPING:?required}
    volumes:
    - wikijs-data:/wiki/data
    networks:
      knowledge-plane:
        aliases:
        - wikijs
      data-plane: {}
    healthcheck:
      test:
      - CMD
      - curl
      - -fsS
      - http://127.0.0.1:3000/healthz
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped
    stop_grace_period: 60s
    read_only: true
    tmpfs:
    - /tmp:rw,noexec,nosuid,size=64m,uid=1000,gid=1000,mode=1777
    - /logs:rw,noexec,nosuid,size=32m,uid=1000,gid=1000,mode=0750
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    cpus: ${WIKIJS_CPU_LIMIT:?required}
    mem_limit: ${WIKIJS_MEMORY_LIMIT:?required}
    pids_limit: ${WIKIJS_PIDS_LIMIT:?required}
    logging: *id001
volumes:
  wikijs-data:
    name: mte-wikijs-data
networks:
  knowledge-plane:
    name: mte-wikijs-plane
  data-plane:
    name: mte-data-plane
    external: true
